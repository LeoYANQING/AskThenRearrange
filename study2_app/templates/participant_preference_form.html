{% extends "base.html" %}

{% block content %}
<section class="card">
  <h2>填写偏好表</h2>
  <p>请为每个物品选择你认为最合适的收纳位置。</p>
  <form method="post" action="/participant/trials/{{ trial.trial_id }}/preference-form">
    <table>
      <thead>
        <tr>
          <th>物品</th>
          <th>收纳位置</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td>{{ item }}</td>
          <td>
            <select name="placement__{{ item }}" required>
              <option value="">请选择</option>
              {% for receptacle in receptacles %}
              <option value="{{ receptacle }}">{{ receptacle }}</option>
              {% endfor %}
            </select>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <button type="submit">提交偏好表</button>
  </form>
</section>
{% endblock %}
